<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة نتائج جامعة اللاذقية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #1a5f7a; --secondary: #c89d32; --success: #27ae60; --danger: #c0392b; --bg: #f4f7f6; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg); margin: 0; padding: 0; color: #333; }
        header { background: var(--primary); color: white; padding: 20px; text-align: center; border-bottom: 5px solid var(--secondary); }
        .container { max-width: 800px; margin: 30px auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { color: var(--primary); text-align: center; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; }
        input, select { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; transition: 0.3s; box-sizing: border-box; }
        input:focus { border-color: var(--primary); outline: none; }
        button { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        button:hover { background: #13455a; transform: translateY(-2px); }
        
        #resultsArea { display: none; margin-top: 30px; animation: fadeIn 0.5s; }
        .student-name { background: var(--secondary); color: white; padding: 10px; border-radius: 8px; text-align: center; font-size: 20px; margin-bottom: 15px; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #ddd; padding: 15px; text-align: center; }
        th { background-color: #f8f9fa; color: var(--primary); }
        .pass { color: var(--success); font-weight: bold; }
        .fail { color: var(--danger); font-weight: bold; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<header>
    <h1>بوابة نتائج جامعة اللاذقية</h1>
    <p>كلية الهندسة الزراعية</p>
</header>

<div class="container">
    <div class="input-group">
        <label>رقم الطالب الجامعي:</label>
        <input type="number" id="studentId" placeholder="أدخل الرقم هنا...">
    </div>

    <div class="input-group">
        <label>اختر السنة الدراسية:</label>
        <select id="yearSelect" onchange="toggleSpecialization()">
            <option value="">-- اختر السنة --</option>
            <option value="1">السنة الأولى</option>
            <option value="2">السنة الثانية</option>
            <option value="3">السنة الثالثة</option>
            <option value="4">السنة الرابعة</option>
            <option value="5">السنة الخامسة (اختصاص)</option>
        </select>
    </div>

    <div id="specGroup" class="input-group" style="display:none;">
        <label>اختر التخصص:</label>
        <select id="specSelect">
            <option value="أحياء دقيقة">أحياء دقيقة</option>
            <option value="إنتاج نباتي">إنتاج نباتي</option>
            <option value="علوم أغذية">علوم أغذية</option>
            <option value="وقاية نبات">وقاية نبات</option>
        </select>
    </div>

    <button onclick="getResults()">استعلام عن النتيجة</button>

    <div id="resultsArea">
        <div class="student-name" id="displayStudentName"></div>
        <table>
            <thead>
                <tr>
                    <th>المادة</th>
                    <th>العملي</th>
                    <th>النظري</th>
                    <th>المجموع</th>
                    <th>الحالة</th>
                </tr>
            </thead>
            <tbody id="gradesTable">
                </tbody>
        </table>
    </div>
</div>

<script>
    function toggleSpecialization() {
        const year = document.getElementById('yearSelect').value;
        const specGroup = document.getElementById('specGroup');
        specGroup.style.display = (year === "5") ? "block" : "none";
    }

    function getResults() {
        const studentId = document.getElementById('studentId').value;
        const year = document.getElementById('yearSelect').value;
        
        if(!studentId || !year) {
            alert("يرجى إكمال البيانات أولاً");
            return;
        }

        // قاعدة بيانات وهمية
        const names = ["أحمد علي عمران", "محمد حسن إبراهيم", "سارة يوسف المحمود", "زينب علي سليمان", "جعفر عيسى الأحمد"];
        const subjects = ["وراثة زراعية", "كيمياء حيوية", "تربة وتسميد", "آلات زراعية", "وقاية نبات"];
        
        // اختيار اسم عشوائي بناءً على الرقم
        const randomName = names[studentId % names.length];
        document.getElementById('displayStudentName').innerText = "الطالب: " + randomName;

        let tableContent = "";
        subjects.forEach(sub => {
            let practical = Math.floor(Math.random() * 11) + 20; // 20-30
            let theory = Math.floor(Math.random() * 41) + 30; // 30-70
            let total = practical + theory;
            let status = total >= 60 ? "<span class='pass'>ناجح</span>" : "<span class='fail'>راسب</span>";
            
            tableContent += `<tr>
                <td>${sub}</td>
                <td>${practical}</td>
                <td>${theory}</td>
                <td>${total}</td>
                <td>${status}</td>
            </tr>`;
        });

        document.getElementById('gradesTable').innerHTML = tableContent;
        document.getElementById('resultsArea').style.display = "block";
    }
</script>

</body>
</html>
