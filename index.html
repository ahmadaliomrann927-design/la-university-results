<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة نتائج جامعة اللاذقية</title>
    <style>
        body {
            background: linear-gradient(135deg, #004a99 0%, #002d5f 100%);
            font-family: 'Arial', sans-serif;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
        }
        .card {
            background: #fff; width: 90%; max-width: 380px;
            border-radius: 20px; overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }
        .header { background: #f8f9fa; padding: 20px; text-align: center; border-bottom: 2px solid #eee; }
        .logo { background: #004a99; color: white; width: 50px; height: 50px; line-height: 50px; border-radius: 50%; margin: 0 auto 10px; font-weight: bold; font-size: 20px; }
        .form-body { padding: 25px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; }
        input, select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 10px; margin-bottom: 15px; box-sizing: border-box; }
        .btn-search { width: 100%; padding: 15px; background: #004a99; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .footer { font-size: 13px; text-align: center; padding: 15px; color: #555; background: #f1f1f1; font-weight: bold; }
        table { width:100%; border-collapse: collapse; margin-top:10px; }
        th { background:#004a99; color:white; padding:8px; border:1px solid #ddd; }
        td { padding:8px; border:1px solid #ddd; text-align:center; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="logo">LU</div>
            <h2>بوابة نتائج الطلاب</h2>
            <p>جامعة اللاذقية</p>
        </div>
        <div class="form-body" id="main-content">
            <label>الرقم الجامعي</label>
            <input type="number" id="studentId" placeholder="أدخل رقمك هنا...">
            <label>السنة الدراسية</label>
            <select>
                <option>السنة الأولى</option>
                <option>السنة الثانية</option>
                <option>السنة الثالثة</option>
                <option>السنة الرابعة</option>
                <option>السنة الخامسة</option>
            </select>
            <button class="btn-search" onclick="showResults()">استعلام عن النتيجة</button>
        </div>
        <div class="footer">مصمم من قبل أحمد علي عمران</div>
    </div>

    <script>
        function showResults() {
            let id = document.getElementById('studentId').value;
            if(!id) { alert("يرجى إدخال الرقم الجامعي"); return; }
            document.getElementById('main-content').innerHTML = `
                <h4 style="color:#004a99">نتائج الطالب: ${id}</h4>
                <table>
                    <tr><th>المادة</th><th>العلامة</th></tr>
                    <tr><td>أساسيات البساتين</td><td style="color:green; font-weight:bold">88</td></tr>
                    <tr style="background:#f9f9f9"><td>إنتاج محاصيل</td><td style="color:green; font-weight:bold">92</td></tr>
                    <tr><td>الحيوان الزراعي</td><td style="color:green; font-weight:bold">85</td></tr>
                </table>
                <button onclick="location.reload()" style="margin-top:15px; width:100%; padding:10px; border-radius:10px; border:none; background:#666; color:white; cursor:pointer;">بحث جديد</button>
            `;
        }
    </script>
</body>
</html>
